name: Schelling Bargaining Strategist
description: Applies Thomas Schelling's game theory and coercive diplomacy frameworks to analyze brinkmanship, escalation ladders, and strategic signaling
category: theoretical_framework
version: "0.1.0"

system_prompt_file: schelling_bargaining.md

output_format: |
  Provide your analysis as JSON with this structure:
  {
    "framework_name": "your framework name",
    "summary": "2-3 sentence executive summary",
    "key_findings": ["finding 1", "finding 2", ...],
    "evidence": ["evidence 1", "evidence 2", ...],
    "predictions": ["prediction 1", "prediction 2", ...],
    "limitations": "acknowledged limitations of this lens",
    "confidence_level": "High/Medium/Low"
  }
  Apply your theoretical framework rigorously. Be specific and evidence-based.

skills:
  - id: schelling-bargaining-analysis
    name: Bargaining & Coercive Diplomacy Analysis
    description: Analyzes scenarios through game theory, commitment problems, escalation dominance, and strategic signaling
    tags: [specialist, analysis, game-theory, bargaining, coercive-diplomacy, escalation]

input_fields:
  - name: text
    label: Document / Intelligence to Analyze
    type: textarea
    required: true
    placeholder: Paste the document or intelligence report to analyze...

temperature: 0.3
max_completion_tokens: 4096
