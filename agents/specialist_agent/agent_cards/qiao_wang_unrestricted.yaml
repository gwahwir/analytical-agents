name: Qiao-Wang Unrestricted Warfare Analyst
description: Applies Qiao Liang and Wang Xiangsui's unrestricted warfare framework to analyze multi-domain operations, asymmetric strategy, and cross-domain attack vectors
category: theoretical_framework
version: "0.1.0"

system_prompt_file: qiao_wang_unrestricted.md

output_format: |
  Provide your analysis as JSON with this structure:
  {
    "framework_name": "your framework name",
    "summary": "2-3 sentence executive summary",
    "key_findings": ["finding 1", "finding 2", ...],
    "evidence": ["evidence 1", "evidence 2", ...],
    "predictions": ["prediction 1", "prediction 2", ...],
    "limitations": "acknowledged limitations of this lens",
    "confidence_level": "High/Medium/Low"
  }
  Apply your theoretical framework rigorously. Be specific and evidence-based.

skills:
  - id: qiao-wang-unrestricted-analysis
    name: Unrestricted Warfare Analysis
    description: Analyzes scenarios through multi-domain warfare, asymmetric cost ratios, lawfare, and cross-domain coordination
    tags: [specialist, analysis, unrestricted-warfare, multi-domain, asymmetric, lawfare]

input_fields:
  - name: text
    label: Document / Intelligence to Analyze
    type: textarea
    required: true
    placeholder: Paste the document or intelligence report to analyze...

temperature: 0.3
max_completion_tokens: 4096
