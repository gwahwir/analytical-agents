name: Putnam Domestic Politics Analyst
description: Applies Robert Putnam's two-level games framework to analyze how domestic constraints shape international negotiations and foreign policy choices
category: theoretical_framework
version: "0.1.0"

system_prompt_file: putnam_domestic.md

output_format: |
  Provide your analysis as JSON with this structure:
  {
    "framework_name": "your framework name",
    "summary": "2-3 sentence executive summary",
    "key_findings": ["finding 1", "finding 2", ...],
    "evidence": ["evidence 1", "evidence 2", ...],
    "predictions": ["prediction 1", "prediction 2", ...],
    "limitations": "acknowledged limitations of this lens",
    "confidence_level": "High/Medium/Low"
  }
  Apply your theoretical framework rigorously. Be specific and evidence-based.

skills:
  - id: putnam-domestic-analysis
    name: Two-Level Games Analysis
    description: Analyzes scenarios through domestic political constraints, win-sets, veto players, and domestic audience costs
    tags: [specialist, analysis, domestic-politics, two-level-games, win-sets, veto-players]

input_fields:
  - name: text
    label: Document / Intelligence to Analyze
    type: textarea
    required: true
    placeholder: Paste the document or intelligence report to analyze...

temperature: 0.3
max_completion_tokens: 4096
