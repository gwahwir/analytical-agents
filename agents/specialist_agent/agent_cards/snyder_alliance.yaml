name: Snyder Alliance Analyst
description: Applies Glenn Snyder's alliance theory to analyze entrapment-abandonment dynamics, coalition cohesion, and patron-client relationships
category: theoretical_framework
version: "0.1.0"

system_prompt_file: snyder_alliance.md

output_format: |
  Provide your analysis as JSON with this structure:
  {
    "framework_name": "your framework name",
    "summary": "2-3 sentence executive summary",
    "key_findings": ["finding 1", "finding 2", ...],
    "evidence": ["evidence 1", "evidence 2", ...],
    "predictions": ["prediction 1", "prediction 2", ...],
    "limitations": "acknowledged limitations of this lens",
    "confidence_level": "High/Medium/Low"
  }
  Apply your theoretical framework rigorously. Be specific and evidence-based.

skills:
  - id: snyder-alliance-analysis
    name: Alliance Dynamics Analysis
    description: Analyzes scenarios through entrapment-abandonment dilemmas, coalition cohesion, and alliance security trade-offs
    tags: [specialist, analysis, alliance-theory, entrapment, abandonment, coalition]

input_fields:
  - name: text
    label: Document / Intelligence to Analyze
    type: textarea
    required: true
    placeholder: Paste the document or intelligence report to analyze...

temperature: 0.3
max_completion_tokens: 4096
