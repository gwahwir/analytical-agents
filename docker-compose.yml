version: "3.9"

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: missioncontrol
      POSTGRES_USER: mc
      POSTGRES_PASSWORD: mc_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mc -d missioncontrol"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ── Echo Agent ─────────────────────────────────────────────────────────────
  echo-agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    ports:
      - "8001:8001"
    environment:
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8001/.well-known/agent.json').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Control Plane ──────────────────────────────────────────────────────────
  # Scale with: docker compose up --scale echo-agent=3
  # Add more agent types via AGENT_URLS:
  #   echo-agent@http://echo-agent:8001,summariser@http://summariser:8002
  control-plane:
    build:
      context: .
      dockerfile: Dockerfile.control-plane
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=INFO
      - AGENT_URLS=echo-agent@http://echo-agent:8001
      - DATABASE_URL=postgresql://mc:mc_password@postgres:5432/missioncontrol
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      echo-agent:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/agents').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── React Dashboard ────────────────────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      control-plane:
        condition: service_healthy

volumes:
  postgres_data:
